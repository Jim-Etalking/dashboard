
<style>
* { box-sizing: border-box; }
:root {
  --bg: #0f1117;
  --surface: #161b27;
  --surface2: #1e2333;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text: #e2e8f0;
  --muted: #64748b;
  --accent: #6366f1;
  --green: #22c55e;
  --blue: #38bdf8;
}
body { background: var(--bg); margin: 0; }
select { background:var(--surface2);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;outline:none; }
select option { background:var(--surface2);color:var(--text); }
#root { background:var(--bg);min-height:600px;padding:20px;font-family:'Segoe UI',system-ui,sans-serif;color:var(--text); }
#statsRow { display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px; }
.stat-card { background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px; }
.stat-label { font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-bottom:6px; }
.stat-val { font-size:28px;font-weight:500;letter-spacing:-0.01em; }
.tbl-wrap { background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden; }
table { width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed; }
thead th { padding:9px 10px;font-size:11px;font-weight:500;letter-spacing:0.06em;color:var(--muted);border-bottom:1px solid var(--border2);background:var(--surface);white-space:nowrap;text-align:center; }
thead th.col-date { text-align:left; }
thead th.col-name { text-align:left; }
tbody td { padding:9px 10px;color:var(--text);border-bottom:1px solid var(--border);white-space:nowrap;text-align:center;font-size:14px;font-variant-numeric:tabular-nums; }
tbody td.col-date { text-align:left;font-size:13px; }
tbody td.col-name { text-align:left; }
tbody tr:hover td { background:rgba(255,255,255,0.025); }
tbody tr:last-child td { border-bottom:none; }
</style>

<div id="root">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:7px;height:7px;background:var(--green);border-radius:50%;"></div>
      <span style="font-size:16px;font-weight:500;">戰情室儀表板</span>
    </div>
    <div style="display:flex;gap:8px;">
      <select id="dateFilter"><option value="all">所有日期</option></select>
      <select id="nameFilter"><option value="all">所有業務</option></select>
    </div>
  </div>

  <div id="statsRow"></div>

  <div class="tbl-wrap">
    <div style="overflow-x:auto;background:var(--surface);">
      <table id="dataTable">
        <thead id="tableHead"></thead>
        <tbody id="tableBody">
          <tr><td colspan="10" style="padding:48px;text-align:center;color:var(--muted);border:none;">資料載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxsHfeyyVnzL6smHORnyjWkmUrVZJ_74CVyYzWQE1yfCGkHNxhgWmvouvjk-7VmVwVq/exec';
let allData = [], dateKey = '', nameKey = '';

function parseNum(v) {
  if(v===null||v===undefined||v==='') return null;
  const n = parseFloat(String(v).replace(/,/g,''));
  return isNaN(n) ? null : n;
}

function setStats(data) {
  const row = document.getElementById('statsRow');
  if(!data.length){ row.innerHTML=''; return; }

  const members = new Set(data.map(r => r[nameKey])).size;

  // 找「今日成交」「今日邀約」欄
  const allKeys = Object.keys(data[0]);
  const dealKey = allKeys.find(k => k.includes('成交'));
  const apptKey = allKeys.find(k => k.includes('邀約'));

  const sumKey = (key) => key ? data.reduce((a,r) => {
    const n = parseNum(r[key]); return n!==null ? a+n : a;
  }, 0) : null;

  const dealSum = sumKey(dealKey);
  const apptSum = sumKey(apptKey);

  const cards = [
    { label: '業務人數', value: members, color: '#818cf8' },
    { label: apptKey || '今日邀約', value: apptSum !== null ? apptSum.toLocaleString() : '—', color: '#38bdf8' },
    { label: dealKey || '今日成交', value: dealSum !== null ? dealSum.toLocaleString() : '—', color: '#22c55e' },
  ];

  row.innerHTML = cards.map(c =>
    `<div class="stat-card">
      <div class="stat-label">${c.label}</div>
      <div class="stat-val" style="color:${c.color};">${c.value}</div>
    </div>`
  ).join('');
}

async function fetchData() {
  try {
    const res = await fetch(API_URL);
    let raw = await res.json();
    if(raw.length > 0){
      dateKey = Object.keys(raw[0]).find(k => k.includes('時間')) || '紀錄時間';
      nameKey = Object.keys(raw[0]).find(k => k.includes('姓名')) || '業務姓名';
      allData = raw.filter(r => String(r['業務ID']||'') !== '-1' && !String(r[nameKey]||'').includes('總和'));
    }
    initFilters();
    filterData();
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="10" style="padding:40px;text-align:center;color:#f87171;border:none;">資料載入失敗</td></tr>';
  }
}

function initFilters() {
  const df = document.getElementById('dateFilter');
  const nf = document.getElementById('nameFilter');
  const dates = [...new Set(allData.map(r => String(r[dateKey]||'').split(' ')[0]))].filter(Boolean).sort().reverse();
  dates.forEach(d => { const o=document.createElement('option'); o.value=o.textContent=d; df.appendChild(o); });
  const names = [...new Set(allData.map(r => r[nameKey]))].filter(Boolean);
  names.forEach(n => { const o=document.createElement('option'); o.value=o.textContent=n; nf.appendChild(o); });
  df.addEventListener('change', filterData);
  nf.addEventListener('change', filterData);
}

function filterData() {
  const sd = document.getElementById('dateFilter').value;
  const sn = document.getElementById('nameFilter').value;
  const filtered = allData.filter(r => {
    const d = String(r[dateKey]||'');
    const n = String(r[nameKey]||'');
    return (sd==='all'||d.startsWith(sd)) && (sn==='all'||n===sn);
  });
  setStats(filtered);
  renderTable(filtered);
}

function renderTable(data) {
  const thead = document.getElementById('tableHead');
  const tbody = document.getElementById('tableBody');
  thead.innerHTML=''; tbody.innerHTML='';

  if(!data.length){
    tbody.innerHTML='<tr><td colspan="10" style="padding:32px;text-align:center;color:var(--muted);border:none;">沒有符合的資料</td></tr>';
    return;
  }

  const headers = Object.keys(data[0]).filter(h => !h.includes('ID'));

  // Determine which cols are numeric (for alignment)
  const numericCols = new Set();
  data.slice(0,5).forEach(row => {
    headers.forEach(h => {
      if(!h.includes('時間') && !h.includes('姓名')) {
        const n = parseNum(row[h]);
        if(n !== null) numericCols.add(h);
      }
    });
  });

  // Set column widths
  const colWidths = headers.map(h => {
    if(h.includes('時間')) return '90px';
    if(h.includes('姓名')) return '110px';
    return '90px';
  });

  // colgroup
  const cg = document.createElement('colgroup');
  colWidths.forEach(w => {
    const col = document.createElement('col');
    col.style.width = w;
    cg.appendChild(col);
  });
  document.getElementById('dataTable').prepend(cg);

  const tr = document.createElement('tr');
  headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h.includes('時間') ? '日期' : h;
    if(h.includes('時間')||h.includes('姓名')) th.className = 'col-'+( h.includes('時間')?'date':'name');
    tr.appendChild(th);
  });
  thead.appendChild(tr);

  data.forEach(row => {
    const tr = document.createElement('tr');
    headers.forEach(h => {
      const td = document.createElement('td');
      let v = row[h] ?? '';
      if(h.includes('時間')) v = String(v).split(' ')[0];
      const n = parseNum(v);
      const isNum = n !== null && numericCols.has(h);
      td.textContent = isNum ? n.toLocaleString() : v;
      if(h.includes('時間')) td.className='col-date';
      else if(h.includes('姓名')) td.className='col-name';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

fetchData();
</script>
