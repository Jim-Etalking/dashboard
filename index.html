
<style>
  :root {
    --bg: #0f1117;
    --surface: #181c27;
    --surface2: #1e2333;
    --border: rgba(255,255,255,0.06);
    --border2: rgba(255,255,255,0.1);
    --text: #e2e8f0;
    --muted: #64748b;
    --accent: #6366f1;
    --green: #22c55e;
  }
</style>

<div style="background:var(--bg);min-height:500px;padding:24px;font-family:'Segoe UI',system-ui,sans-serif;color:var(--text);">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:7px;height:7px;background:var(--green);border-radius:50%;"></div>
      <span style="font-size:16px;font-weight:500;letter-spacing:0.01em;">Etalking Dashboard</span>
    </div>
    <div style="display:flex;gap:8px;">
      <select id="dateFilter" style="background:var(--surface2);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;outline:none;">
        <option value="all">所有日期</option>
      </select>
      <select id="nameFilter" style="background:var(--surface2);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;outline:none;">
        <option value="all">所有業務</option>
      </select>
    </div>
  </div>

  <div id="statsRow" style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;"></div>

  <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;">
    <div style="overflow-x:auto;">
      <table id="dataTable" style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead id="tableHead"></thead>
        <tbody id="tableBody">
          <tr><td colspan="10" style="padding:48px;text-align:center;color:var(--muted);">資料載入中...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxsHfeyyVnzL6smHORnyjWkmUrVZJ_74CVyYzWQE1yfCGkHNxhgWmvouvjk-7VmVwVq/exec';
let allData = [], dateKey = '', nameKey = '';

function parseNum(v) {
  if(v === null || v === undefined || v === '') return null;
  const n = parseFloat(String(v).replace(/,/g,''));
  return isNaN(n) ? null : n;
}

function sumCol(data, key) {
  return data.reduce((a, r) => {
    const n = parseNum(r[key]);
    return n !== null ? a + n : a;
  }, 0);
}

function setStats(data) {
  const row = document.getElementById('statsRow');
  if(!data.length){ row.innerHTML=''; return; }

  const keys = Object.keys(data[0]).filter(k => !k.includes('ID') && !k.includes('時間') && !k.includes('姓名'));
  
  // Find numeric columns that have meaningful sums
  const numCols = keys.filter(k => {
    const vals = data.map(r => parseNum(r[k])).filter(v => v !== null);
    return vals.length > 0 && vals.some(v => v > 0);
  });

  // Pick top 2 numeric cols by sum, plus count of unique members
  const colSums = numCols.map(k => ({ k, s: sumCol(data, k) })).sort((a,b) => b.s - a.s);
  const top2 = colSums.slice(0, 2);

  const members = new Set(data.map(r => r[nameKey])).size;

  const cards = [
    { label: '業務人數', value: members, color: '#818cf8' },
    ...top2.map((c,i) => ({
      label: c.k,
      value: c.s.toLocaleString(),
      color: i===0 ? '#6366f1' : '#38bdf8'
    }))
  ];

  row.innerHTML = cards.map(c =>
    `<div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px 20px;">
      <div style="font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-bottom:8px;">${c.label}</div>
      <div style="font-size:26px;font-weight:500;color:${c.color};letter-spacing:-0.01em;">${c.value}</div>
    </div>`
  ).join('');
}

async function fetchData() {
  try {
    const res = await fetch(API_URL);
    let raw = await res.json();
    if(raw.length > 0){
      dateKey = Object.keys(raw[0]).find(k => k.includes('時間')) || '紀錄時間';
      nameKey = Object.keys(raw[0]).find(k => k.includes('姓名')) || '業務姓名';
      allData = raw.filter(r => String(r['業務ID']||'') !== '-1' && !String(r[nameKey]||'').includes('總和'));
    }
    initFilters();
    filterData();
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="10" style="padding:40px;text-align:center;color:#f87171;">資料載入失敗</td></tr>';
  }
}

function initFilters() {
  const df = document.getElementById('dateFilter');
  const nf = document.getElementById('nameFilter');
  const dates = [...new Set(allData.map(r => String(r[dateKey]||'').split(' ')[0]))].filter(Boolean).sort().reverse();
  dates.forEach(d => { const o=document.createElement('option'); o.value=o.textContent=d; df.appendChild(o); });
  const names = [...new Set(allData.map(r => r[nameKey]))].filter(Boolean);
  names.forEach(n => { const o=document.createElement('option'); o.value=o.textContent=n; nf.appendChild(o); });
  df.addEventListener('change', filterData);
  nf.addEventListener('change', filterData);
}

function filterData() {
  const sd = document.getElementById('dateFilter').value;
  const sn = document.getElementById('nameFilter').value;
  const filtered = allData.filter(r => {
    const d = String(r[dateKey]||'');
    const n = String(r[nameKey]||'');
    return (sd==='all'||d.startsWith(sd)) && (sn==='all'||n===sn);
  });
  setStats(filtered);
  renderTable(filtered);
}

function renderTable(data) {
  const thead = document.getElementById('tableHead');
  const tbody = document.getElementById('tableBody');
  thead.innerHTML=''; tbody.innerHTML='';

  if(!data.length){
    tbody.innerHTML='<tr><td colspan="10" style="padding:32px;text-align:center;color:var(--muted);">沒有符合的資料</td></tr>';
    return;
  }

  const headers = Object.keys(data[0]).filter(h => !h.includes('ID'));
  const tr = document.createElement('tr');
  headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h.includes('時間') ? '日期' : h;
    th.style.cssText = 'padding:10px 16px;text-align:left;font-size:11px;font-weight:500;letter-spacing:0.07em;color:var(--muted);border-bottom:1px solid var(--border2);white-space:nowrap;background:var(--surface);';
    tr.appendChild(th);
  });
  thead.appendChild(tr);

  data.forEach(row => {
    const tr = document.createElement('tr');
    tr.style.cssText = 'border-bottom:1px solid var(--border);transition:background 0.1s;';
    tr.onmouseover = () => tr.style.background='rgba(255,255,255,0.025)';
    tr.onmouseout = () => tr.style.background='';
    headers.forEach(h => {
      const td = document.createElement('td');
      let v = row[h] ?? '';
      if(h.includes('時間')) v = String(v).split(' ')[0];
      const n = parseNum(v);
      const isNum = n !== null && !h.includes('時間') && !h.includes('姓名');
      td.textContent = isNum ? n.toLocaleString() : v;
      td.style.cssText = `padding:10px 16px;font-size:13px;color:var(--text);white-space:nowrap;${isNum?'font-variant-numeric:tabular-nums;text-align:right;':''}`;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });

  // right-align numeric headers
  const ths = thead.querySelectorAll('th');
  const firstDataRow = tbody.querySelector('tr');
  if(firstDataRow){
    firstDataRow.querySelectorAll('td').forEach((td,i) => {
      if(td.style.textAlign==='right') ths[i].style.textAlign='right';
    });
  }
}

fetchData();
</script>
