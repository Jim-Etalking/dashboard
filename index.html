<style>
* { box-sizing: border-box; }
:root {
  --bg: #0f1117;
  --surface: #161b27;
  --surface2: #1e2333;
  --border: rgba(255,255,255,0.06);
  --border2: rgba(255,255,255,0.1);
  --text: #e2e8f0;
  --muted: #64748b;
  --green: #22c55e;
}
body { background: var(--bg); margin: 0; }
select { background:var(--surface2);color:var(--text);border:1px solid var(--border2);border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;outline:none; }
select option { background:var(--surface2);color:var(--text); }
#root { background:var(--bg);min-height:600px;padding:20px;font-family:'Segoe UI',system-ui,sans-serif;color:var(--text); }
#statsRow { display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px; }
.stat-card { background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 18px; }
.stat-label { font-size:11px;color:var(--muted);letter-spacing:0.06em;margin-bottom:6px; }
.stat-val { font-size:28px;font-weight:500;letter-spacing:-0.01em; }
.tbl-wrap { background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden; }
table { width:100%;border-collapse:collapse;font-size:13px;table-layout:auto; }
thead th { padding:9px 8px;font-size:11px;font-weight:500;letter-spacing:0.05em;color:var(--muted);border-bottom:1px solid var(--border2);background:var(--surface);white-space:nowrap;text-align:center; }
thead th.left { text-align:left; }
tbody td { padding:9px 8px;color:var(--text);border-bottom:1px solid var(--border);white-space:nowrap;text-align:center;font-size:14px;font-variant-numeric:tabular-nums; }
tbody td.left { text-align:left; }
tbody tr:hover td { background:rgba(255,255,255,0.025); }
tbody tr:last-child td { border-bottom:none; }
</style>

<div id="root">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <div style="display:flex;align-items:center;gap:10px;">
      <div style="width:7px;height:7px;background:var(--green);border-radius:50%;"></div>
      <span style="font-size:16px;font-weight:500;">Etalking DASHBOARD</span>
    </div>
    <div style="display:flex;gap:8px;">
      <select id="branchFilter"><option value="all">所有分部</option></select>
      <select id="dateFilter"><option value="all">所有日期</option></select>
      <select id="nameFilter"><option value="all">所有業務</option></select>
    </div>
  </div>

  <div id="statsRow"></div>

  <div class="tbl-wrap">
    <table id="dataTable">
      <thead id="tableHead"></thead>
      <tbody id="tableBody">
        <tr><td colspan="10" style="padding:48px;text-align:center;color:var(--muted);border:none;">資料載入中...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxsHfeyyVnzL6smHORnyjWkmUrVZJ_74CVyYzWQE1yfCGkHNxhgWmvouvjk-7VmVwVq/exec';
let allData = [], dateKey = '', nameKey = '';

function parseNum(v) {
  if(v===null||v===undefined||v==='') return null;
  const n = parseFloat(String(v).replace(/,/g,''));
  return isNaN(n) ? null : n;
}

function setStats(data) {
  const row = document.getElementById('statsRow');
  if(!data.length){ row.innerHTML=''; return; }
  const members = new Set(data.map(r => r[nameKey])).size;
  const allKeys = Object.keys(data[0]);
  const dealKey = allKeys.find(k => k.includes('成交'));
  const apptKey = allKeys.find(k => k.includes('邀約'));
  const sumKey = k => k ? data.reduce((a,r) => { const n=parseNum(r[k]); return n!==null?a+n:a; }, 0) : null;
  const cards = [
    { label:'業務人數', value:members, color:'#818cf8' },
    { label:apptKey||'今日邀約', value:sumKey(apptKey)!==null?sumKey(apptKey).toLocaleString():'—', color:'#38bdf8' },
    { label:dealKey||'今日成交', value:sumKey(dealKey)!==null?sumKey(dealKey).toLocaleString():'—', color:'#22c55e' },
  ];
  row.innerHTML = cards.map(c =>
    `<div class="stat-card"><div class="stat-label">${c.label}</div><div class="stat-val" style="color:${c.color};">${c.value}</div></div>`
  ).join('');
}

async function fetchData() {
  try {
    const res = await fetch(API_URL);
    let raw = await res.json();
    if(raw.length > 0){
      dateKey = Object.keys(raw[0]).find(k => k.includes('時間')) || '紀錄時間';
      nameKey = Object.keys(raw[0]).find(k => k.includes('姓名')) || '業務姓名';
      allData = raw.filter(r => String(r['業務ID']||'')!=='-1' && !String(r[nameKey]||'').includes('總和'));
    }
    initFilters(); 
    filterData();
  } catch(e) {
    document.getElementById('tableBody').innerHTML =
      '<tr><td colspan="10" style="padding:40px;text-align:center;color:#f87171;border:none;">資料載入失敗</td></tr>';
  }
}

function initFilters() {
  const bf = document.getElementById('branchFilter');
  const df = document.getElementById('dateFilter');
  const nf = document.getElementById('nameFilter');
  
  bf.innerHTML = '<option value="all">所有分部</option>';
  df.innerHTML = '<option value="all">所有日期</option>';
  nf.innerHTML = '<option value="all">所有業務</option>';

  // 💡 自訂排序：指定台北第一、台中第二，其餘（如未分類）放最後
  const branchOrder = ['台北', '台中'];
  const branches = [...new Set(allData.map(r => r['_branch']))].filter(Boolean).sort((a, b) => {
      const idxA = branchOrder.indexOf(a) === -1 ? 99 : branchOrder.indexOf(a);
      const idxB = branchOrder.indexOf(b) === -1 ? 99 : branchOrder.indexOf(b);
      return idxA - idxB;
  });
  
  branches.forEach(b => { 
      const o=document.createElement('option'); o.value=o.textContent=b; bf.appendChild(o); 
  });

  const dates = [...new Set(allData.map(r => String(r[dateKey]||'').split(' ')[0]))].filter(Boolean).sort().reverse();
  dates.forEach(d => { 
      const o=document.createElement('option'); o.value=o.textContent=d; df.appendChild(o); 
  });
  
  const names = [...new Set(allData.map(r => r[nameKey]))].filter(Boolean).sort();
  names.forEach(n => { 
      const o=document.createElement('option'); o.value=o.textContent=n; nf.appendChild(o); 
  });
    
  bf.addEventListener('change', filterData);
  df.addEventListener('change', filterData);
  nf.addEventListener('change', filterData);

  // 自動選擇今日或最新日期的邏輯
  const d = new Date();
  const todayStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
  
  if (dates.includes(todayStr)) {
      df.value = todayStr;
  } else if (dates.length > 0) {
      df.value = dates[0];
  }
}

function filterData() {
  const sb = document.getElementById('branchFilter').value;
  const sd = document.getElementById('dateFilter').value;
  const sn = document.getElementById('nameFilter').value;
  
  const filtered = allData.filter(r =>
    (sb==='all'||r['_branch']===sb) &&
    (sd==='all'||String(r[dateKey]||'').startsWith(sd)) &&
    (sn==='all'||String(r[nameKey]||'')===sn)
  );
  setStats(filtered); renderTable(filtered);
}

function renderTable(data) {
  const thead = document.getElementById('tableHead');
  const tbody = document.getElementById('tableBody');
  const old = document.getElementById('dataTable').querySelector('colgroup');
  if(old) old.remove();
  thead.innerHTML=''; tbody.innerHTML='';

  if(!data.length){
    tbody.innerHTML='<tr><td colspan="10" style="padding:32px;text-align:center;color:var(--muted);border:none;">沒有符合的資料</td></tr>';
    return;
  }

  const headers = Object.keys(data[0]).filter(h => !h.includes('ID') && h !== '_branch');

  const numericCols = new Set();
  data.slice(0,5).forEach(row => {
    headers.forEach(h => {
      if(!h.includes('時間')&&!h.includes('姓名') && parseNum(row[h])!==null) numericCols.add(h);
    });
  });

  const tr = document.createElement('tr');
  headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h.includes('時間') ? '日期' : h;
    if(h.includes('時間')||h.includes('姓名')) th.className='left';
    tr.appendChild(th);
  });
  thead.appendChild(tr);

  data.forEach(row => {
    const tr = document.createElement('tr');
    headers.forEach(h => {
      const td = document.createElement('td');
      let v = row[h] ?? '';
      if(h.includes('時間')) v = String(v).split(' ')[0];
      const n = parseNum(v);
      const isNum = n!==null && numericCols.has(h);
      td.textContent = isNum ? n.toLocaleString() : v;
      if(h.includes('時間')||h.includes('姓名')) td.className='left';
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

fetchData();
</script>
