
<style>
  :root {
    --dash-bg: #0d1117;
    --dash-surface: #161b22;
    --dash-surface2: #1c2230;
    --dash-border: rgba(255,255,255,0.07);
    --dash-border2: rgba(255,255,255,0.12);
    --dash-text: #e6edf3;
    --dash-muted: #7d8590;
    --dash-accent: #388bfd;
    --dash-accent2: #1f6feb;
    --dash-green: #3fb950;
    --dash-header-bg: #161b22;
  }
</style>

<div style="background:var(--dash-bg);min-height:500px;padding:20px;font-family:'Segoe UI',system-ui,sans-serif;color:var(--dash-text);">

  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <div style="display:flex;align-items:center;gap:12px;">
      <div style="width:8px;height:8px;background:var(--dash-green);border-radius:50%;box-shadow:0 0 6px var(--dash-green);"></div>
      <span style="font-size:18px;font-weight:500;letter-spacing:0.02em;color:var(--dash-text);">戰情室儀表板</span>
      <span style="font-size:11px;background:rgba(56,139,253,0.12);color:var(--dash-accent);border:1px solid rgba(56,139,253,0.3);padding:2px 8px;border-radius:20px;letter-spacing:0.05em;">LIVE</span>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <select id="dateFilter" style="background:var(--dash-surface2);color:var(--dash-text);border:1px solid var(--dash-border2);border-radius:6px;padding:7px 12px;font-size:13px;cursor:pointer;outline:none;">
        <option value="all">所有日期</option>
      </select>
      <select id="nameFilter" style="background:var(--dash-surface2);color:var(--dash-text);border:1px solid var(--dash-border2);border-radius:6px;padding:7px 12px;font-size:13px;cursor:pointer;outline:none;">
        <option value="all">所有業務</option>
      </select>
    </div>
  </div>

  <div id="statsRow" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:18px;"></div>

  <div style="background:var(--dash-surface);border:1px solid var(--dash-border);border-radius:8px;overflow:hidden;">
    <div style="padding:12px 16px;border-bottom:1px solid var(--dash-border);display:flex;justify-content:space-between;align-items:center;">
      <span style="font-size:13px;color:var(--dash-muted);">資料記錄</span>
      <span id="recordCount" style="font-size:13px;color:var(--dash-muted);">—</span>
    </div>
    <div style="overflow-x:auto;">
      <table id="dataTable" style="width:100%;border-collapse:collapse;font-size:13px;">
        <thead id="tableHead"></thead>
        <tbody id="tableBody">
          <tr><td colspan="10" style="padding:40px;text-align:center;color:var(--dash-muted);">
            <div id="loadMsg" style="display:flex;flex-direction:column;align-items:center;gap:8px;">
              <span style="font-size:20px;">↻</span>
              <span>資料載入中...</span>
            </div>
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbxsHfeyyVnzL6smHORnyjWkmUrVZJ_74CVyYzWQE1yfCGkHNxhgWmvouvjk-7VmVwVq/exec';
let allData = [];
let dateKey = '';
let nameKey = '';

const statStyle = `background:var(--dash-surface2);border:1px solid var(--dash-border);border-radius:6px;padding:12px 16px;`;

function setStats(data) {
  const row = document.getElementById('statsRow');
  const total = data.length;
  const names = new Set(data.map(r => r[nameKey])).size;
  const dates = new Set(data.map(r => String(r[dateKey]||'').split(' ')[0])).size;
  const numKeys = Object.keys(data[0]||{}).filter(k => !k.includes('ID') && !k.includes('時間') && !k.includes('姓名'));
  let sum = 0, sumKey = '';
  for(let k of numKeys){
    const vals = data.map(r => parseFloat(r[k])||0);
    const s = vals.reduce((a,b)=>a+b,0);
    if(s > sum){ sum = s; sumKey = k; }
  }
  row.innerHTML = [
    ['筆資料', total, '#388bfd'],
    ['業務人數', names, '#3fb950'],
    ['日期數', dates, '#d29922'],
    [sumKey||'合計', sum ? sum.toLocaleString() : '—', '#bc8cff']
  ].map(([label,val,color]) =>
    `<div style="${statStyle}">
      <div style="font-size:11px;color:var(--dash-muted);letter-spacing:0.05em;margin-bottom:6px;">${label}</div>
      <div style="font-size:22px;font-weight:500;color:${color};">${val}</div>
    </div>`
  ).join('');
}

async function fetchData() {
  try {
    const res = await fetch(API_URL);
    let raw = await res.json();
    if(raw.length > 0){
      dateKey = Object.keys(raw[0]).find(k => k.includes('時間')) || '紀錄時間';
      nameKey = Object.keys(raw[0]).find(k => k.includes('姓名')) || '業務姓名';
      allData = raw.filter(item => {
        let id = String(item['業務ID']||'');
        let nm = String(item[nameKey]||'');
        return id !== '-1' && !nm.includes('總和');
      });
    }
    initFilters();
    filterData();
  } catch(e) {
    document.getElementById('loadMsg').innerHTML = '<span style="color:#f85149;">❌ 資料載入失敗，請確認 API 連線</span>';
  }
}

function initFilters() {
  const df = document.getElementById('dateFilter');
  const nf = document.getElementById('nameFilter');
  const dates = [...new Set(allData.map(r => String(r[dateKey]||'').split(' ')[0]))].filter(Boolean).sort().reverse();
  dates.forEach(d => { let o = document.createElement('option'); o.value = o.textContent = d; df.appendChild(o); });
  const names = [...new Set(allData.map(r => r[nameKey]))].filter(Boolean);
  names.forEach(n => { let o = document.createElement('option'); o.value = o.textContent = n; nf.appendChild(o); });
  df.addEventListener('change', filterData);
  nf.addEventListener('change', filterData);
}

function filterData() {
  const sd = document.getElementById('dateFilter').value;
  const sn = document.getElementById('nameFilter').value;
  const filtered = allData.filter(r => {
    const d = String(r[dateKey]||'');
    const n = String(r[nameKey]||'');
    return (sd==='all'||d.startsWith(sd)) && (sn==='all'||n===sn);
  });
  setStats(filtered);
  renderTable(filtered);
}

function renderTable(data) {
  const thead = document.getElementById('tableHead');
  const tbody = document.getElementById('tableBody');
  const rc = document.getElementById('recordCount');
  thead.innerHTML = ''; tbody.innerHTML = '';
  rc.textContent = data.length + ' 筆';

  if(!data.length){
    tbody.innerHTML = '<tr><td colspan="10" style="padding:32px;text-align:center;color:var(--dash-muted);">沒有符合的資料</td></tr>';
    return;
  }

  const headers = Object.keys(data[0]).filter(h => !h.includes('ID'));
  const tr = document.createElement('tr');
  headers.forEach(h => {
    const th = document.createElement('th');
    th.textContent = h.includes('時間') ? '日期' : h;
    th.style.cssText = 'padding:10px 14px;text-align:left;font-size:11px;font-weight:500;letter-spacing:0.08em;color:var(--dash-muted);border-bottom:1px solid var(--dash-border2);white-space:nowrap;text-transform:uppercase;';
    tr.appendChild(th);
  });
  thead.appendChild(tr);

  data.forEach((row, i) => {
    const tr = document.createElement('tr');
    tr.style.cssText = `border-bottom:1px solid var(--dash-border);transition:background 0.1s;`;
    tr.onmouseover = () => tr.style.background = 'rgba(255,255,255,0.03)';
    tr.onmouseout = () => tr.style.background = '';
    headers.forEach(h => {
      const td = document.createElement('td');
      let v = row[h] || '';
      if(h.includes('時間')) v = String(v).split(' ')[0];
      td.textContent = v;
      const isNum = !isNaN(parseFloat(v)) && !h.includes('時間') && !h.includes('姓名');
      td.style.cssText = `padding:10px 14px;font-size:13px;color:${isNum?'#e6edf3':'var(--dash-text)'};white-space:nowrap;${isNum?'font-variant-numeric:tabular-nums;':''}`;
      tr.appendChild(td);
    });
    tbody.appendChild(tr);
  });
}

fetchData();
</script>
